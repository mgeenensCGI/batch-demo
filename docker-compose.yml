services:
  postgres:
    image: postgres:16-alpine
    container_name: batch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: batchdb
      POSTGRES_USER: batchuser
      POSTGRES_PASSWORD: batchpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batchuser -d batchdb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: