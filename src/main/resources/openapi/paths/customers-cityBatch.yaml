post:
  tags:
    - Customers
  summary: Run city batch
  description: This endpoint triggers the city formatting batch.
  responses:
    '202':
      description: Job launch accepted
      content:
        application/json:
          schema:
            $ref: '../schemas/job-run-response.yaml'
    '400':
      description: Invalid job parameters
      content:
        application/json:
          schema:
            $ref: '../schemas/batch-error-response.yaml'
    '409':
      description: Job already running or cannot be restarted
      content:
        application/json:
          schema:
            $ref: '../schemas/batch-error-response.yaml'
    '500':
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '../schemas/batch-error-response.yaml'