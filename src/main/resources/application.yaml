spring:
  application:
    name: batch-demo

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:batchdb}
    username: ${DB_USER:batchuser}
    password: ${DB_PASSWORD:batchpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  sql:
    init:
      mode: never

logging:
  level:
    org.springframework.batch: INFO
    org.springframework.jdbc.core: INFO
    org.hibernate.SQL: WARN
